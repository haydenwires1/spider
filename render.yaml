services:
  - type: web
    name: website-audit-crawler
    runtime: docker
    plan: starter
    healthCheckPath: /api/health
    disk:
      name: audit-data
      mountPath: /var/data
      sizeGB: 10
    envVars:
      - key: NODE_ENV
        value: production
      - key: AUDIT_DATA_DIR
        value: /var/data
      - key: DATABASE_URL
        value: file:/var/data/audits.sqlite
      - key: RESPECT_ROBOTS_TXT
        value: "true"
      - key: APP_USERNAME
        sync: false
      - key: APP_PASSWORD
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_AUDIT_MODEL
        value: gpt-5.4-mini
